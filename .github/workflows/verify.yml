# NFR-REG-1-FE: Regression Gate - No commit unless verify is green
# FamiliMatch (desktop6) CI pipeline

name: Verify

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        env:
          # Mirror Vercel prod: render the shared-journey path so
          # ResultsStory tests (extraAction nav role) match local + prod.
          VITE_USE_SHARED_JOURNEY: 'true'
        run: npm run test:run

      - name: Build
        env:
          VITE_USE_SHARED_JOURNEY: 'true'
        run: npm run build

  contract-tests:
    name: Contract Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        # `--grep` is a Mocha/Jest-CLI flag and was rejected by Vitest 2.x.
        # `-t "contract"` is Vitest's testNamePattern; `--passWithNoTests`
        # keeps the job green while desktop6 has no contract-tagged tests yet
        # (contracts currently validated upstream in famililook-shared / desktop3).
        run: npm run test:run -- -t "contract" --passWithNoTests
